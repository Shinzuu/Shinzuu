name: generate snake

on:
  schedule:
    - cron: "0 */12 * * *"   # twice a day
  workflow_dispatch:          # manual run button
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-dark&color_snake=#8a0f0f&color_dots=#0a0505,#3a0606,#5a0a0a,#8a0f0f,#b31d1d
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#8a0f0f&color_dots=#050505,#3a0606,#5a0a0a,#8a0f0f,#b31d1d

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
